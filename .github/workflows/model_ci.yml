name: Model_CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run unit tests before building"
        required: true
        type: boolean
        default: true

jobs:
  aek:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-mock

      - name: Run Tests
        if: ${{ github.event_name == 'push' || inputs.run_tests == true }}
        run: python -m pytest

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push model image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            usertopio/robo-learn-ai-model:latest-amd64
            usertopio/robo-learn-ai-model:1.0.0-amd64
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
